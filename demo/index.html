<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PII Firewall — демо</title>
<style>
  :root{
    --blue:#007aff; --blue-d:#0060df; --ink:#1a1a2e; --muted:#8a8fa3;
    --bg:#eef1f6; --card:#ffffff; --chat:#f7f7f8;
    --person:#7c3aed; --inn:#0ea5e9; --email:#14b8a6; --phone:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#dfe7f5,var(--bg));
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:28px 16px;gap:16px}
  .head{display:flex;align-items:center;gap:12px;width:min(920px,100%)}
  .head .logo{width:40px;height:40px}
  .head h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.02em}
  .head .sub{font-size:13px;color:var(--muted)}
  .badge{margin-left:auto;display:inline-flex;align-items:center;gap:7px;background:#e7f7ee;
    color:#0f9d58;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:999px;
    border:1px solid #b7e6c9;transition:.3s;white-space:nowrap}
  .badge .dot{width:8px;height:8px;border-radius:50%;background:#0f9d58}
  .badge.pulse{background:#d6f5e3;box-shadow:0 0 0 0 #0f9d5844;animation:bpulse 1s ease-out}
  @keyframes bpulse{0%{box-shadow:0 0 0 0 #0f9d5866}100%{box-shadow:0 0 0 16px #0f9d5800}}

  .stage{width:min(920px,100%)}
  .browser{background:var(--card);border-radius:16px;border:1px solid #e3e7ef;
    box-shadow:0 24px 60px -18px #0b1b3a44;overflow:hidden;position:relative}
  .chrome{display:flex;align-items:center;gap:8px;padding:11px 14px;background:#f2f3f7;border-bottom:1px solid #e6e9f0}
  .chrome i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .chrome .r{background:#ff5f57}.chrome .y{background:#febc2e}.chrome .g{background:#28c840}
  .url{margin-left:10px;background:#fff;border:1px solid #e3e7ef;border-radius:8px;padding:5px 12px;
    font-size:12.5px;color:#5b6172;display:flex;gap:7px;align-items:center}
  .url svg{width:12px;height:12px;opacity:.6}

  .chat{height:330px;overflow:hidden;padding:20px;background:var(--chat);display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;gap:10px;max-width:86%;animation:rise .3s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .msg .av{flex:none;width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-size:13px;font-weight:700}
  .msg.ai .av{background:#10a37f;color:#fff}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.user .av{background:var(--blue);color:#fff}
  .bubble{background:#fff;border:1px solid #e6e9f0;border-radius:14px;padding:11px 14px;font-size:14px;line-height:1.55;
    box-shadow:0 2px 6px #0b1b3a0a;white-space:pre-wrap;word-break:break-word}
  .msg.user .bubble{background:#eaf2ff;border-color:#cfe0fb}
  .typing{display:inline-flex;gap:4px;padding:4px 2px}
  .typing i{width:7px;height:7px;border-radius:50%;background:#b9bfce;animation:blink 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .composer{display:flex;gap:10px;align-items:flex-end;padding:14px;border-top:1px solid #e6e9f0;background:#fff}
  .input{flex:1;min-height:46px;max-height:130px;overflow:hidden;border:1.5px solid #e0e4ee;border-radius:12px;
    padding:12px 14px;font-size:14px;line-height:1.5;color:var(--ink);background:#fff;white-space:pre-wrap;word-break:break-word}
  .input.active{border-color:var(--blue);box-shadow:0 0 0 3px #007aff22}
  .caret{display:inline-block;width:2px;height:1.05em;background:var(--blue);vertical-align:-2px;animation:cb .9s step-end infinite}
  @keyframes cb{50%{opacity:0}}
  .send{flex:none;width:46px;height:46px;border-radius:12px;border:none;background:var(--blue);color:#fff;
    font-size:17px;cursor:pointer;display:grid;place-items:center;transition:.2s}
  .send.go{transform:scale(1.08);background:var(--blue-d)}

  .ent{border-radius:5px;padding:0 2px;transition:background .3s,color .2s}
  .ent.person{background:#f0e9ff}.ent.inn{background:#e6f5fd}.ent.email{background:#e4f8f4}.ent.phone{background:#fef3e2}
  .ent.hl{animation:flash .35s ease}
  @keyframes flash{0%{transform:scale(1)}45%{transform:scale(1.08)}100%{transform:scale(1)}}
  .ent.masked{background:#eef2ff;color:#3452c6;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:600;font-size:.92em}
  .ent.green{background:#dcfce7;color:#166534;animation:flash .35s ease}

  .widget{position:absolute;right:18px;bottom:96px;width:214px;background:#fff;border:1px solid #e3e7ef;
    border-radius:14px;box-shadow:0 14px 34px -10px #0b1b3a55;padding:12px;display:flex;flex-direction:column;gap:8px;
    transition:.25s;z-index:5}
  .widget.act{box-shadow:0 14px 40px -8px #007aff77;border-color:#bcd6ff}
  .whead{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px}
  .whead .logo{width:20px;height:20px}
  .wstatus{font-size:11.5px;color:var(--muted);min-height:14px}
  .chips{display:flex;flex-wrap:wrap;gap:4px;min-height:0}
  .chip{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:10px;background:#eaf2ff;color:#0a58c2;animation:rise .25s both}
  .wbtn{border:none;border-radius:8px;padding:7px;font-size:12.5px;font-weight:600;cursor:pointer;text-align:center;transition:.15s}
  .wbtn.mask{background:var(--blue);color:#fff}
  .wbtn.rest{background:#eef1f4;color:#333}
  .wbtn.clicked{transform:scale(.93);filter:brightness(.92)}

  .cursor{position:absolute;left:0;top:0;width:24px;height:24px;pointer-events:none;z-index:30;
    transition:transform .5s cubic-bezier(.5,.05,.25,1);filter:drop-shadow(0 2px 3px #0004)}

  .caption{margin-top:14px;text-align:center;font-size:15px;font-weight:600;color:#26304a;min-height:24px;transition:.25s;width:min(920px,100%)}
  .caption b{color:var(--blue)}
  .foot{font-size:12px;color:var(--muted);text-align:center;width:min(920px,100%)}
  .foot b{color:#26304a}
</style>
</head>
<body>
  <div class="head">
    <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
      <path d="M24 3 6 10v13c0 11 7.6 18.7 18 22 10.4-3.3 18-11 18-22V10L24 3z" fill="#0b46b8"/>
      <path d="M14 24c3-5 7-7 10-7s7 2 10 7c-3 5-7 7-10 7s-7-2-10-7z" fill="#fff"/>
      <circle cx="24" cy="24" r="3.4" fill="#0b46b8"/>
      <rect x="9" y="22" width="30" height="4" rx="2" transform="rotate(45 24 24)" fill="#fff"/>
    </svg>
    <div>
      <h1>PII Firewall</h1>
      <div class="sub">Локальный файрвол персональных данных для AI-чатов</div>
    </div>
    <div class="badge" id="badge"><span class="dot"></span>🔒 Данные не уходят в сеть</div>
  </div>

  <div class="stage">
    <div class="browser" id="browser">
      <div class="chrome">
        <i class="r"></i><i class="y"></i><i class="g"></i>
        <div class="url"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm3 8H9V6a3 3 0 1 1 6 0v3z"/></svg>chatgpt.com</div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="composer">
        <div class="input" id="input"></div>
        <button class="send" id="send">▶</button>
      </div>

      <div class="widget" id="widget">
        <div class="whead">
          <svg class="logo" viewBox="0 0 48 48"><path d="M24 3 6 10v13c0 11 7.6 18.7 18 22 10.4-3.3 18-11 18-22V10L24 3z" fill="#0b46b8"/><path d="M14 24c3-5 7-7 10-7s7 2 10 7c-3 5-7 7-10 7s-7-2-10-7z" fill="#fff"/><circle cx="24" cy="24" r="3.4" fill="#0b46b8"/><rect x="9" y="22" width="30" height="4" rx="2" transform="rotate(45 24 24)" fill="#fff"/></svg>
          PII Firewall
        </div>
        <div class="wstatus" id="wstatus">Готов к защите</div>
        <div class="chips" id="chips"></div>
        <button class="wbtn mask" id="wmask">Замаскировать</button>
        <button class="wbtn rest" id="wrest">Восстановить</button>
      </div>

      <div class="cursor" id="cursor">
        <svg viewBox="0 0 24 24"><path d="M4 2l6 15 2.3-5.6L18 9z" fill="#1a1a2e" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="caption" id="caption"></div>
  </div>
  <div class="foot">Все данные — <b>синтетические</b>. Расширение не запрашивает сетевых разрешений — проверьте <b>manifest.json</b>. · #KodikLaunchpad</div>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));
const $ = id => document.getElementById(id);
const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// synthetic scene — «help draft a reply», so the AI answer echoes the data as a DRAFT (no "sending")
const SEG = [
  {t:"Помоги составить ответ клиенту: "},
  {t:"Иванов Иван Иванович", e:"person", m:"[PERSON_1]"},
  {t:", ИНН "},
  {t:"7712345671", e:"inn", m:"[RU_INN_1]"},
  {t:", e-mail "},
  {t:"ivan.test@example.com", e:"email", m:"[EMAIL_1]"},
  {t:", тел. "},
  {t:"+7 916 123-45-67", e:"phone", m:"[PHONE_1]"},
  {t:"."}
];
const RESP = [
  {t:"Готово! Черновик ответа:\n«Уважаемый "},
  {e:"person", m:"[PERSON_1]", o:"Иванов Иван Иванович"},
  {t:", благодарим за обращение. По вашей заявке (ИНН "},
  {e:"inn", m:"[RU_INN_1]", o:"7712345671"},
  {t:") всё готово. Для связи: "},
  {e:"email", m:"[EMAIL_1]", o:"ivan.test@example.com"},
  {t:" или "},
  {e:"phone", m:"[PHONE_1]", o:"+7 916 123-45-67"},
  {t:".»"}
];
const CHIPS = ["PERSON","RU_INN","EMAIL","PHONE"];
const plain = SEG.map(s=>s.t).join('');
const inputHTML = SEG.map(s => s.e ? `<span class="ent ${s.e}" data-m="${s.m}">${esc(s.t)}</span>` : esc(s.t)).join('');
const respHTML = RESP.map(s => s.e ? `<span class="ent masked ${s.e}" data-o="${esc(s.o)}">${esc(s.m)}</span>` : esc(s.t)).join('');

const browser=$('browser'), cursor=$('cursor');
let cx=70, cy=300;
function cursorTo(x,y,scale=1){ cx=x; cy=y; cursor.style.transform=`translate(${x}px,${y}px) scale(${scale})`; }
async function moveTo(el){
  const b=browser.getBoundingClientRect(), r=el.getBoundingClientRect();
  cursorTo(r.left-b.left+r.width*0.5, r.top-b.top+r.height*0.55);
  await sleep(560);
}
async function clickBtn(el){
  cursorTo(cx,cy,0.8); el.classList.add('clicked');
  await sleep(150);
  cursorTo(cx,cy,1); el.classList.remove('clicked');
  await sleep(140);
}

function cap(html){ $('caption').innerHTML = html; }
function reset(){
  $('chat').innerHTML=''; $('input').innerHTML=''; $('chips').innerHTML='';
  $('wstatus').textContent='Готов к защите'; $('widget').classList.remove('act');
  $('input').classList.remove('active'); $('caption').innerHTML='';
  cursorTo(70, 300, 1);
}

async function type(str){
  const box = $('input'); box.classList.add('active'); box.innerHTML='';
  for(let i=0;i<str.length;i++){
    box.innerHTML = esc(str.slice(0,i+1)) + '<span class="caret"></span>';
    await sleep(str[i]===' '?16:26);
  }
  box.innerHTML = str;
}

async function sequence(){
  reset();
  cap('1. Пишете рабочий промпт — с персональными данными клиента');
  await sleep(450);
  await type(plain);
  await sleep(400);

  // 2. click «Замаскировать» → fast local masking
  cap('2. Клик «Замаскировать» — ПДн исчезают <b>прямо в браузере</b>');
  $('widget').classList.add('act');
  await moveTo($('wmask'));
  await clickBtn($('wmask'));
  $('input').innerHTML = inputHTML;
  const ents = [...$('input').querySelectorAll('.ent')];
  for(let i=0;i<ents.length;i++){
    const el = ents[i];
    el.classList.add('hl'); el.textContent = el.dataset.m; el.classList.add('masked');
    const chip=document.createElement('span'); chip.className='chip'; chip.textContent=CHIPS[i];
    $('chips').appendChild(chip);
    $('wstatus').textContent = 'Защищено сущностей: '+(i+1);
    await sleep(120);
  }
  await sleep(500);

  // 3. send masked → nothing leaks
  cap('3. В AI уходит <b>уже замаскированный</b> текст — оригиналы остаются у вас');
  $('send').classList.add('go'); $('badge').classList.add('pulse');
  await sleep(450);
  const u=document.createElement('div'); u.className='msg user';
  u.innerHTML = `<div class="av">Я</div><div class="bubble">${$('input').innerHTML}</div>`;
  $('chat').appendChild(u);
  $('input').innerHTML=''; $('input').classList.remove('active');
  $('send').classList.remove('go'); $('badge').classList.remove('pulse');
  await sleep(650);

  // 4. AI drafts a reply, using the placeholders
  cap('4. AI отвечает, сохраняя метки');
  const a=document.createElement('div'); a.className='msg ai';
  a.innerHTML = `<div class="av">AI</div><div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div>`;
  $('chat').appendChild(a);
  await sleep(1000);
  a.querySelector('.bubble').innerHTML = respHTML;
  await sleep(800);

  // 5. click «Восстановить» → local restore
  cap('5. Клик «Восстановить» — оригиналы возвращаются <b>локально</b>');
  await moveTo($('wrest'));
  await clickBtn($('wrest'));
  const rents=[...a.querySelectorAll('.ent')];
  for(const el of rents){
    el.classList.remove('masked'); el.classList.add('green'); el.textContent = el.dataset.o;
    await sleep(140);
  }
  await sleep(900);

  cap('🔒 <b>Данные не уходят в сеть</b> — всё на вашем устройстве');
  await sleep(2400);
}

(async function loop(){ while(true){ await sequence(); await sleep(300); } })();
</script>
</body>
</html>
