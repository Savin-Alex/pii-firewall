<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PII Firewall</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, sans-serif; width: 280px; margin: 0; padding: 14px; color: #1a1a1a; background: #fff; }
    @media (prefers-color-scheme: dark) { body { background: #1e1e1e; color: #eee; } }
    h1 { font-size: 15px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }
    @media (prefers-color-scheme: dark) { .row { border-color: #333; } }
    .muted { color: #888; }
    .stat { font-size: 22px; font-weight: 700; color: #007aff; }
    .btns { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    button { padding: 9px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: #007aff; color: #fff; }
    button.secondary { background: #eef1f4; color: #333; }
    @media (prefers-color-scheme: dark) { button.secondary { background: #333; color: #eee; } }
    .switch { position: relative; display: inline-block; width: 38px; height: 22px; }
    .switch input { display: none; }
    .slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; transition: .2s; }
    .slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: #34c759; }
    input:checked + .slider::before { transform: translateX(16px); }
    .toast { font-size: 12px; color: #34c759; min-height: 14px; margin-top: 8px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #999; margin: 14px 0 6px; }
    .sessions:empty::after { content: attr(data-empty); font-size: 12px; color: #aaa; }
    .session { padding: 6px 0; border-bottom: 1px solid #eee; font-size: 12px; }
    @media (prefers-color-scheme: dark) { .session { border-color: #333; } }
    .session-host { font-weight: 600; }
    .session-types { color: #888; }
  </style>
</head>
<body>
  <h1>🛡️ <span data-i18n="extension_name">PII Firewall</span></h1>

  <div class="row">
    <span data-i18n="popup_site">Сайт</span>
    <span id="site-name" class="muted">—</span>
  </div>
  <div class="row">
    <span data-i18n="popup_prevented">Предотвращено утечек</span>
    <span id="stats-count" class="stat">0</span>
  </div>
  <div class="row" id="guard-row">
    <span data-i18n="popup_guard_site">Guard на этом сайте</span>
    <label class="switch"><input type="checkbox" id="guard-site-toggle"><span class="slider"></span></label>
  </div>

  <div class="btns">
    <button id="demo" data-i18n="popup_demo">Демо-режим</button>
    <button id="forget-session" class="secondary" data-i18n="popup_forget_session">Забыть эту сессию</button>
    <button id="forget-all" class="secondary" data-i18n="popup_forget_all">Забыть всё</button>
    <button id="open-options" class="secondary" data-i18n="popup_options">Настройки</button>
    <button id="open-onboarding" class="secondary" data-i18n="popup_onboarding">Как пользоваться</button>
  </div>
  <div class="toast" id="toast"></div>

  <div class="section-title" data-i18n="popup_recent">Недавние сессии</div>
  <div class="sessions" id="sessions" data-empty="—"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
